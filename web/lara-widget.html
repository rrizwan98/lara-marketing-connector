<!doctype html>
<!-- Lara Marketing widget v2 — ChatGPT Apps SDK template (ui://widget/lara-v2.html)
     Marketing-themed UI. Renders from MCP Apps bridge (ui/notifications/tool-result)
     with legacy window.openai fallback. No external fetches (CSP-free).
     Views auto-detect from structuredContent: session | catalog | route | skill. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #ffffff; --fg: #17171f; --muted: #6b7280; --line: #e8e6f2;
    --brand1: #7c3aed; --brand2: #d946ef; --brand3: #f97316;
    --soft: #f6f3ff; --chip: #f4f2fb; --card: #ffffff; --ok: #059669;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #17171d; --fg: #ededf2; --muted: #a1a1b3; --line: #2e2c3a;
            --soft: #221f31; --chip: #262336; --card: #1d1b28; --ok: #34d399; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
         font: 14px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .wrap { padding: 0 0 12px; }
  .hero { background: linear-gradient(120deg, var(--brand1), var(--brand2) 70%, var(--brand3));
          color: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .hero .logo { width: 38px; height: 38px; border-radius: 12px; background: rgba(255,255,255,.18);
                display: flex; align-items: center; justify-content: center; font-size: 19px; flex: none; }
  .hero h1 { margin: 0; font-size: 15px; letter-spacing: .01em; }
  .hero .sub { font-size: 12px; opacity: .9; }
  .hero .badge { margin-left: auto; background: rgba(255,255,255,.2); border-radius: 999px;
                 padding: 3px 11px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .body { padding: 12px 16px 0; }
  .stats { display: flex; gap: 8px; flex-wrap: wrap; margin: 2px 0 10px; }
  .stat { background: var(--chip); border-radius: 12px; padding: 9px 13px; min-width: 92px; }
  .stat b { display: block; font-size: 17px;
            background: linear-gradient(120deg, var(--brand1), var(--brand2));
            -webkit-background-clip: text; background-clip: text; color: transparent; }
  .stat span { color: var(--muted); font-size: 11px; }
  .cats { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: var(--chip); border-radius: 999px; padding: 4px 11px; font-size: 12px; }
  .label { margin: 12px 0 6px; font-size: 11px; font-weight: 800; color: var(--muted);
           text-transform: uppercase; letter-spacing: .08em; }
  .task { background: var(--soft); border-left: 3px solid var(--brand1); border-radius: 8px;
          padding: 9px 12px; font-size: 13px; font-style: italic; }
  .heroSkill { border: 1.5px solid transparent; border-radius: 14px; padding: 13px 14px; margin: 10px 0 8px;
               background: linear-gradient(var(--card), var(--card)) padding-box,
                           linear-gradient(120deg, var(--brand1), var(--brand2)) border-box; }
  .heroSkill .top { display: flex; align-items: center; gap: 8px; }
  .heroSkill .rank1 { background: linear-gradient(120deg, var(--brand1), var(--brand2)); color: #fff;
                      font-size: 11px; font-weight: 800; border-radius: 999px; padding: 2px 9px; }
  .heroSkill .nm { font-weight: 800; font-size: 15px; }
  .heroSkill .cat { margin-left: auto; color: var(--muted); font-size: 11px; }
  .heroSkill .ds { color: var(--muted); font-size: 12.5px; margin-top: 5px; }
  .heroSkill button { margin-top: 9px; border: 0; border-radius: 9px; padding: 7px 14px; cursor: pointer;
                      background: linear-gradient(120deg, var(--brand1), var(--brand2)); color: #fff;
                      font-weight: 700; font-size: 12.5px; }
  .alt { display: flex; gap: 10px; padding: 8px 11px; border: 1px solid var(--line); border-radius: 11px;
         margin: 6px 0; align-items: center; }
  .alt .n { color: var(--muted); font-weight: 800; font-size: 12px; flex: none; }
  .alt .nm { font-weight: 650; white-space: nowrap; }
  .alt .ds { color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis;
             white-space: nowrap; }
  .why { color: var(--muted); font-size: 12px; margin-top: 8px; }
  input.search { width: 100%; padding: 9px 13px; margin: 2px 0 8px; border: 1.5px solid var(--line);
                 border-radius: 11px; background: var(--bg); color: var(--fg); outline: none; font-size: 13px; }
  input.search:focus { border-color: var(--brand1); }
  .skill { display: flex; gap: 10px; padding: 8px 11px; border: 1px solid var(--line);
           border-radius: 11px; margin: 6px 0; align-items: flex-start; }
  .skill .nm { font-weight: 650; white-space: nowrap; }
  .skill .ds { color: var(--muted); font-size: 12px;
               display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .skill button { margin-left: auto; flex: none; border: 1px solid var(--line); background: var(--chip);
                  color: var(--fg); border-radius: 8px; padding: 4px 11px; font-size: 12px; cursor: pointer; }
  .skill button:hover { border-color: var(--brand1); color: var(--brand1); }
  .doc { border: 1px solid var(--line); border-radius: 13px; padding: 13px 15px;
         max-height: 430px; overflow: auto; white-space: pre-wrap; font-size: 13px; background: var(--card); }
  .doc h2 { font-size: 14px; margin: 13px 0 4px;
            background: linear-gradient(120deg, var(--brand1), var(--brand2));
            -webkit-background-clip: text; background-clip: text; color: transparent; }
  .doc h3 { font-size: 13px; margin: 10px 0 3px; }
  .foot { margin: 12px 16px 0; color: var(--muted); font-size: 11px; display: flex; gap: 6px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 999px; flex: none;
         background: linear-gradient(120deg, var(--brand1), var(--brand2)); }
  pre.raw { background: var(--chip); border-radius: 11px; padding: 10px; overflow: auto; font-size: 12px; }
  .ok { color: var(--ok); }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="hero"><div class="logo">📣</div>
    <div><h1>Lara · Canz Marketing</h1><div class="sub">Loading…</div></div></div>
</div>

<script>
(function () {
  "use strict";
  var payload = null;
  var CAT_EMOJI = { "Strategy & GTM": "🎯", "Content & Copy": "🖋️", "SEO & Discovery": "🔍",
                    "Conversion (CRO)": "📈", "Paid & Measurement": "💰",
                    "Growth & Retention": "🚀", "Sales & RevOps": "🤝", "Other": "✨" };

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function followUp(prompt) {
    try {
      if (window.openai && typeof window.openai.sendFollowUpMessage === "function") {
        window.openai.sendFollowUpMessage({ prompt: prompt });
      }
    } catch (_) {}
  }
  window.__laraUse = function (name) {
    followUp("Use Lara's '" + name + "' skill for my task: open it with domain_get_skill, follow it, and do the work.");
  };

  function hero(sub, badge, emoji) {
    return '<div class="hero"><div class="logo">' + (emoji || "📣") + "</div><div>" +
      "<h1>Lara · Canz Marketing</h1>" +
      '<div class="sub">' + esc(sub) + "</div></div>" +
      (badge ? '<div class="badge">' + esc(badge) + "</div>" : "") + "</div>";
  }
  function foot() {
    return '<div class="foot"><span class="dot"></span>Lara Marketing · 45 skills · skills-first, always</div>';
  }

  function viewSession(p) {
    var skills = p.skills_available || [];
    var st = p.user_state || {};
    var clients = st.clients || [];
    var lim = st.limits || {};
    var used = lim.tasks_used_today != null ? lim.tasks_used_today : 0;
    var html = hero("Session active — ready for your marketing work", (p.tier || "") + " plan", "📣");
    html += '<div class="body"><div class="stats">' +
      '<div class="stat"><b>' + skills.length + "</b><span>skills ready</span></div>" +
      '<div class="stat"><b>' + clients.length + "</b><span>clients on file</span></div>" +
      '<div class="stat"><b>' + esc(used) + "</b><span>tasks today</span></div>" +
      '<div class="stat"><b class="ok">✓</b><span>playbook-driven</span></div></div>';
    html += '<div class="label">What Lara can run for you</div><div class="cats">' +
      ["🎯 Strategy", "🖋️ Copy & Content", "🔍 SEO", "📈 CRO", "💰 Ads", "✉️ Email",
       "📱 Social", "🚀 Growth", "🤝 Sales"].map(function (c) {
        return '<span class="chip">' + c + "</span>";
      }).join("") + "</div>";
    if (clients.length) {
      html += '<div class="label">Your clients</div><div class="cats">' + clients.map(function (c) {
        return '<span class="chip">🏷️ ' + esc(c) + "</span>";
      }).join("") + "</div>";
    }
    html += '<div class="why">Describe any marketing job — “write my landing page”, “fix my churn”, ' +
      "“plan my launch” — and Lara routes it to the right playbook.</div></div>";
    return html + foot();
  }

  function viewRoute(p) {
    var details = p.details || (p.skills || []).map(function (s) { return { name: s }; });
    var top = details[0] || {};
    var html = hero("Task analysed — recommended skill stack", "skill router", "🧭");
    html += '<div class="body">';
    if (p.task) {
      html += '<div class="label">Your task</div><div class="task">“' + esc(p.task) + "”</div>";
    }
    html += '<div class="label">Primary skill</div>';
    html += '<div class="heroSkill"><div class="top"><span class="rank1">PRIMARY</span>' +
      '<span class="nm">' + esc(top.name || "") + "</span>" +
      (top.category ? '<span class="cat">' + esc(CAT_EMOJI[top.category] || "") + " " + esc(top.category) + "</span>" : "") +
      "</div>" +
      (top.description ? '<div class="ds">' + esc(top.description) + "</div>" : "") +
      '<button onclick="__laraUse(\'' + esc(top.name || "") + '\')">Open playbook →</button></div>';
    if (details.length > 1) {
      html += '<div class="label">Supporting skills</div>';
      details.slice(1).forEach(function (d, i) {
        html += '<div class="alt"><span class="n">' + (i + 2) + '</span><span class="nm">' + esc(d.name) +
          "</span>" + (d.description ? '<span class="ds">' + esc(d.description) + "</span>" : "") + "</div>";
      });
    }
    if (p.rationale) html += '<div class="why">' + esc(p.rationale) + "</div>";
    html += "</div>";
    return html + foot();
  }

  function viewCatalog(p) {
    var skills = p.skills || [];
    var html = hero(skills.length + " marketing playbooks — every job follows one", "catalog", "📚");
    html += '<div class="body"><input class="search" id="q" placeholder="🔍 Filter skills… (email, seo, ads, churn…)" oninput="__laraFilter(this.value)">';
    var byCat = {};
    skills.forEach(function (s) {
      var c = s.category || "Other";
      (byCat[c] = byCat[c] || []).push(s);
    });
    Object.keys(byCat).sort().forEach(function (cat) {
      html += '<div class="label" data-cat>' + (CAT_EMOJI[cat] || "✨") + " " + esc(cat) + "</div>";
      byCat[cat].forEach(function (s) {
        var nm = s.folder || s.name;
        html += '<div class="skill" data-skill data-k="' + esc((nm + " " + (s.description || "")).toLowerCase()) + '">' +
          '<div><div class="nm">' + esc(nm) + '</div><div class="ds">' + esc(s.description || "") + "</div></div>" +
          '<button onclick="__laraUse(\'' + esc(nm) + '\')">Use</button></div>';
      });
    });
    html += "</div>";
    return html + foot();
  }
  window.__laraFilter = function (q) {
    q = (q || "").toLowerCase();
    var rows = document.querySelectorAll("[data-skill]");
    for (var i = 0; i < rows.length; i++) {
      rows[i].style.display = !q || rows[i].getAttribute("data-k").indexOf(q) >= 0 ? "" : "none";
    }
  };

  function viewSkill(p) {
    var body = String(p.body || "").replace(/^---[\s\S]*?---\s*/, "");
    var rendered = esc(body)
      .replace(/^### (.*)$/gm, "<h3>$1</h3>")
      .replace(/^## (.*)$/gm, "<h2>$1</h2>")
      .replace(/^# (.*)$/gm, "<h2>$1</h2>")
      .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
    var html = hero("Playbook open — Lara follows this to do the work", esc(p.name || "skill"), "📖");
    html += '<div class="body"><div class="doc">' + rendered + "</div></div>";
    return html + foot();
  }

  function render() {
    var el = document.getElementById("app");
    if (!payload) return;
    var p = payload;
    try {
      if (p.persona && p.router_map) el.innerHTML = viewSession(p);
      else if (Array.isArray(p.skills) && p.rationale !== undefined) el.innerHTML = viewRoute(p);
      else if (Array.isArray(p.skills)) el.innerHTML = viewCatalog(p);
      else if (p.name && p.body) el.innerHTML = viewSkill(p);
      else el.innerHTML = hero("Result", "", "📣") + '<div class="body"><pre class="raw">' +
        esc(JSON.stringify(p, null, 2)) + "</pre></div>" + foot();
    } catch (e) {
      el.innerHTML = hero("Result", "", "📣") + '<div class="body"><pre class="raw">' +
        esc(JSON.stringify(p, null, 2)) + "</pre></div>" + foot();
    }
  }
  function setPayload(p) { if (p && typeof p === "object") { payload = p; render(); } }

  // 1) MCP Apps bridge (standard)
  window.addEventListener("message", function (ev) {
    if (ev.source !== window.parent) return;
    var m = ev.data;
    if (!m || m.jsonrpc !== "2.0") return;
    if (m.method === "ui/notifications/tool-result") {
      var prm = m.params || {};
      setPayload(prm.structuredContent || (prm.result && prm.result.structuredContent) || prm);
    }
  }, { passive: true });

  // 2) Legacy window.openai runtime (compatibility)
  if (window.openai && window.openai.toolOutput) setPayload(window.openai.toolOutput);
  window.addEventListener("openai:set_globals", function (ev) {
    var g = ev.detail && ev.detail.globals;
    if (g && g.toolOutput) setPayload(g.toolOutput);
  }, { passive: true });
})();
</script>
</body>
</html>
