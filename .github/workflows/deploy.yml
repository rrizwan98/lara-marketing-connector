name: test-and-deploy

# Push to main -> run tests -> ONLY if tests pass, sync to the Hugging Face Space.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Smoke tests (must pass)
        run: python tests/test_smoke.py

  deploy:
    name: Deploy to Hugging Face
    needs: test            # <-- gate: deploy runs only if 'test' succeeds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push --force \
            "https://rrizwan98:${HF_TOKEN}@huggingface.co/spaces/rrizwan98/lara-marketing-connector" \
            HEAD:main
